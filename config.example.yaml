  #     community: private
  #   - match: 10.0.0.0/16
  #     version: 3
  #     security_level: authPriv
  #     username: snmpuser
  #     auth_protocol: SHA
  #     auth_password: authpass
  #     priv_protocol: AES
  #     priv_password: privpass

# mikrotik_api:  # Seed device is implicitly included
#   extra_devices:
#     - host: 192.168.1.5
#   username: admin
#   password: changeme

output:
  format: json
  file: topology.json

concurrency: 10

logging:
  level: info
