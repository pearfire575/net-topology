seed:
  host: 192.168.1.1
  type: mikrotik
  api:
    username: admin
    password: changeme  # Supports ${ENV_VAR} substitution
    port: 8728

discovery_scope:
  - 192.168.1.0/24

snmp:
  default:
    version: 2c
    community: public
  # overrides:  # Most-specific match wins (IP > subnet)
